<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GivyAPIs Documentation</title>
    <style>
       /*
 * GLOBAL STYLES - DARK GREEN THEME
 */
:root {
    --bg-color: #282c34;
    --text-color: #abb2bf;
    --accent-color: #68d391;
    --secondary-color: #e5c07b;
    --error-color: #e06c75;
    --card-bg: #21252b;
    --border-radius: 0px;
    --box-shadow-color: rgba(104, 211, 145, 0.2);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Ubuntu Mono', monospace;
    background-color: var(--bg-color);
    min-height: 100vh;
    padding: 20px;
    color: var(--text-color);
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px 0;
    border-bottom: 2px dashed var(--accent-color);
    margin-bottom: 30px;
}

header h1 {
    color: var(--accent-color);
    font-size: 2.5em;
    margin-bottom: 5px;
}

header p {
    color: var(--secondary-color);
    font-style: italic;
}

/* CONTACT */
.contact-info {
    text-align: center;
    margin-bottom: 30px;
    color: var(--text-color);
}

.contact-info a {
    color: var(--accent-color);
    text-decoration: none;
    margin: 0 10px;
    transition: color 0.2s;
}

.contact-info a:hover {
    color: var(--secondary-color);
}

/* ENDPOINT CATEGORIES */
.endpoint-categories details {
    background-color: var(--card-bg);
    margin-bottom: 15px;
    border: 1px solid rgba(104, 211, 145, 0.5);
    border-radius: var(--border-radius);
    box-shadow: 0 0 10px var(--box-shadow-color);
}

.endpoint-categories summary {
    padding: 15px;
    cursor: pointer;
    font-weight: bold;
    color: var(--accent-color);
    font-size: 1.1em;
    outline: none;
    transition: background-color 0.2s;
}

.endpoint-categories summary:hover {
    background-color: #2a3038;
}

.endpoint-categories .category-desc {
    padding: 0 15px 15px;
    color: #999;
    font-size: 0.9em;
}

/* ENDPOINT CARD */
.endpoint-list {
    padding: 10px 15px;
}

.endpoint-card {
    background-color: #3b4048;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: var(--border-radius);
}

.endpoint-card h3 {
    color: var(--secondary-color);
    font-size: 1.2em;
    border-bottom: 1px dotted #495057;
    padding-bottom: 5px;
    margin-bottom: 10px;
}

.endpoint-card p {
    margin-bottom: 10px;
}

.endpoint-info {
    color: #999;
    font-size: 0.9em;
}

.endpoint-path {
    background-color: #495057;
    padding: 5px 10px;
    border-radius: 3px;
    font-size: 0.9em;
    word-break: break-all;
    margin-bottom: 15px;
}

.endpoint-params label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
    color: var(--accent-color);
}

.endpoint-params input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    background-color: #1e2127;
    border: 1px solid #495057;
    color: var(--text-color);
    border-radius: var(--border-radius);
    font-family: 'Ubuntu Mono', monospace;
}

.endpoint-execute-btn {
    background-color: var(--accent-color);
    color: var(--card-bg);
    border: none;
    padding: 10px 20px;
    margin-top: 15px;
    cursor: pointer;
    font-family: 'Ubuntu Mono', monospace;
    font-weight: bold;
    transition: background-color 0.2s;
    border-radius: var(--border-radius);
    width: 100%;
}

.endpoint-execute-btn:hover:not(:disabled) {
    background-color: #48bb78;
}

.endpoint-execute-btn:disabled {
    background-color: #495057;
    cursor: not-allowed;
}

/* RESULT SECTION */
.result-section {
    margin-top: 20px;
    background-color: #1e2127;
    border: 1px solid #495057;
    padding: 15px;
    border-radius: var(--border-radius);
    display: none; /* Initially hidden */
}

.result-header {
    font-weight: bold;
    color: var(--secondary-color);
    margin-bottom: 5px;
}

.request-url {
    color: var(--accent-color);
    margin-bottom: 15px;
    word-break: break-all;
    font-size: 0.9em;
}

.result-content {
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-color);
    font-size: 0.85em;
    max-height: 400px;
    overflow-y: auto;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px 0;
    margin-top: 30px;
    border-top: 2px dashed var(--accent-color);
    font-size: 0.8em;
    color: #666;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="api-name">Loading...</h1>
            <p id="api-tagline"></p>
        </header>

        <div class="contact-info">
            <span id="api-version"></span> | Developed by <span id="api-creator"></span> | 
            <a id="telegram-link" href="#" target="_blank">Telegram</a> | 
            <a id="github-link" href="#" target="_blank">GitHub</a>
        </div>

        <div class="endpoint-categories">
            </div>

        <footer>
            <p>&copy; 2025 <span id="footer-name"></span>. All Rights Reserved.</p>
        </footer>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        // Function to load endpoints dynamically
        function loadEndpoints() {
            // *** INI ADALAH BARIS KRUSIAL YANG DIUBAH ***
            // Mengambil konfigurasi dari server (root settings.json)
            fetch('/api/config') 
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Failed to load config: ${response.status} ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    // Update Header Info
                    document.title = data.name + ' Documentation';
                    document.getElementById('api-name').textContent = data.name;
                    document.getElementById('api-tagline').textContent = data.tagline;
                    document.getElementById('api-version').textContent = 'Version: ' + data.version;
                    document.getElementById('api-creator').textContent = data.apiSettings.creator;
                    document.getElementById('footer-name').textContent = data.name;

                    // Update Contact Links
                    document.getElementById('telegram-link').href = data.contact.telegram;
                    document.getElementById('github-link').href = data.contact.github;

                    const categoriesContainer = document.querySelector('.endpoint-categories');
                    categoriesContainer.innerHTML = ''; // Clear loading message

                    // Loop through categories
                    data.categories.forEach((category, catIndex) => {
                        const categoryDetails = document.createElement('details');
                        categoryDetails.open = catIndex === 0; // Open first category by default
                        
                        const summary = document.createElement('summary');
                        summary.textContent = `${category.icon} ${category.name}`;
                        categoryDetails.appendChild(summary);

                        const desc = document.createElement('div');
                        desc.className = 'category-desc';
                        desc.textContent = category.description;
                        categoryDetails.appendChild(desc);
                        
                        const list = document.createElement('div');
                        list.className = 'endpoint-list';

                        // Loop through endpoints in category
                        category.items.forEach(endpoint => {
                            const card = document.createElement('div');
                            card.className = 'endpoint-card';
                            
                            // Title
                            const title = document.createElement('h3');
                            title.textContent = `${endpoint.name} (${endpoint.status.toUpperCase()})`;
                            card.appendChild(title);
                            
                            // Description
                            const info = document.createElement('p');
                            info.className = 'endpoint-info';
                            info.textContent = endpoint.desc;
                            card.appendChild(info);

                            // Path
                            const pathDiv = document.createElement('div');
                            pathDiv.className = 'endpoint-path';
                            pathDiv.textContent = endpoint.path.replace('?', '?') + '...';
                            card.appendChild(pathDiv);

                            // Parameters Section
                            const paramsDiv = document.createElement('div');
                            paramsDiv.className = 'endpoint-params';
                            card.appendChild(paramsDiv);

                            const inputs = {};
                            if (endpoint.params) {
                                for (const key in endpoint.params) {
                                    const label = document.createElement('label');
                                    label.textContent = `${key} : (${endpoint.params[key]})`;
                                    paramsDiv.appendChild(label);
                                    
                                    const input = document.createElement('input');
                                    input.type = 'text';
                                    input.id = `input-${endpoint.name}-${key}`;
                                    input.placeholder = endpoint.params[key];
                                    paramsDiv.appendChild(input);
                                    inputs[key] = input;
                                }
                            }
                            
                            // Execute Button
                            const executeBtn = document.createElement('button');
                            executeBtn.className = 'endpoint-execute-btn';
                            executeBtn.textContent = '▶️ Execute';
                            executeBtn.onclick = () => executeRequest(endpoint, inputs, executeBtn, data.apiSettings.apikey);
                            card.appendChild(executeBtn);

                            // Result Section
                            const resultDiv = document.createElement('div');
                            resultDiv.className = 'result-section';
                            resultDiv.id = `result-${endpoint.name}`;
                            card.appendChild(resultDiv);

                            list.appendChild(card);
                        });

                        categoryDetails.appendChild(list);
                        categoriesContainer.appendChild(categoryDetails);
                    });

                })
                .catch(error => {
                    const categoriesContainer = document.querySelector('.endpoint-categories');
                    categoriesContainer.innerHTML = `<p style="color: var(--error-color); text-align: center;">Error loading configuration: ${error.message}. Make sure the server is running and settings.json is accessible via /api/config.</p>`;
                    document.getElementById('api-name').textContent = 'API Error';
                });
        }

        // Function to execute the API request
        function executeRequest(endpoint, inputs, btnElement, apiKeyList) {
            btnElement.disabled = true;
            btnElement.textContent = '...Loading';
            
            const resultDiv = document.getElementById(`result-${endpoint.name}`);
            let url = BASE_URL + endpoint.path.split('?')[0]; // Ambil hanya base path

            const queryParams = new URLSearchParams();
            
            // Tambahkan apikey default jika ada
            if (apiKeyList && apiKeyList.length > 0) {
                queryParams.append('apikey', apiKeyList[0]);
            }

            // Tambahkan parameter dari input fields
            Object.keys(inputs).forEach(key => {
                const inputValue = inputs[key].value;
                if (inputValue) {
                    queryParams.append(key, inputValue);
                }
            });
            
            if (queryParams.toString()) {
                url += '?' + queryParams.toString();
            }
            
            // Show result section
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div class="result-header">📡 Request URL:</div>
                <div class="request-url">${url}</div>
                <div class="result-header">📦 Response:</div>
                <div class="result-content">Loading...</div>
            `;
            
            // Fetch data
            fetch(url)
                .then(response => {
                    // Check if response is 404/500 and handle error reading
                    if (!response.ok) {
                        return response.text().then(text => { 
                            // Tampilkan 50 karakter pertama dari error text
                            throw new Error(`HTTP Error ${response.status}: ${text.substring(0, 50)}...`);
                        });
                    }
                    return response.json();
                })
                .then(data => {
                    const resultContent = resultDiv.querySelector('.result-content');
                    resultContent.textContent = JSON.stringify(data, null, 2);
                    resultContent.style.color = 'var(--text-color)'; // Reset color
                    btnElement.disabled = false;
                    btnElement.textContent = '▶️ Execute';
                })
                .catch(error => {
                    const resultContent = resultDiv.querySelector('.result-content');
                    resultContent.textContent = `Error: ${error.message}`;
                    resultContent.style.color = 'var(--error-color)';
                    btnElement.disabled = false;
                    btnElement.textContent = '▶️ Execute';
                });
        }

        // Initialize
        loadEndpoints();
    </script>
</body>
</html>
