<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GivyAPIs Documentation</title>
    <style>
       /*
 * GLOBAL STYLES - DARK GREEN THEME
 */
:root {
    --bg-color: #282c34;
    --text-color: #abb2bf;
    --accent-color: #68d391; /* Hijau - Digunakan untuk Badge Ready, Button, dll. */
    --secondary-color: #e5c07b; /* Kuning/Emas - Digunakan untuk Main Header dan Endpoint Header */
    --error-color: #e06c75;
    --card-bg: #21252b;
    --border-radius: 0px;
    --box-shadow-color: rgba(104, 211, 145, 0.2);
    /* Warna Hover Biru Gelap Transparan */
    --hover-color-dark-blue: rgba(0, 100, 140, 0.3); 
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* === PERBAIKAN SCROLL: Tambahkan smooth behavior ke HTML === */
html {
    scroll-behavior: smooth;
}
/* ========================================================== */


body {
    font-family: 'Ubuntu Mono', monospace;
    background-color: var(--bg-color);
    min-height: 100vh;
    padding: 20px;
    color: var(--text-color);
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

/* ------------------------------------- */
/* PENAMBAHAN ANIMASI SMOOTH (TRANSITION) */
/* ------------------------------------- */
header, details, summary, .contact-links a, .execute-btn, .endpoint-group, .endpoint-group summary {
    /* Transisi untuk warna, border, dan shadow */
    transition: all 0.3s ease-in-out; 
}

/* HEADER */
header {
    background: var(--card-bg);
    padding: 30px;
    border-radius: var(--border-radius);
    box-shadow: 0 4px 15px var(--box-shadow-color);
    margin-bottom: 24px;
    text-align: center;
    border: 1px solid var(--accent-color);
}

/* H1: GivyAPIs (Menggunakan Kuning/Emas) */
h1 {
    font-size: 2.5em;
    color: var(--secondary-color); 
    margin-bottom: 8px;
    text-shadow: 0 0 5px var(--secondary-color); 
}

.tagline {
    color: var(--text-color);
    font-size: 1.1em;
    margin-bottom: 16px;
}

.contact-links {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
}

.contact-links a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--accent-color);
    color: var(--bg-color);
    text-decoration: none;
    border-radius: var(--border-radius);
    font-size: 0.9em;
    font-weight: bold;
    border: 1px solid var(--accent-color);
}

.contact-links a:hover {
    background: var(--bg-color);
    color: var(--accent-color);
    transform: none;
    box-shadow: 0 0 10px var(--accent-color);
}

/* ENDPOINTS CONTAINER */
.endpoints-container {
    background: var(--card-bg);
    padding: 24px;
    border-radius: var(--border-radius);
    box-shadow: 0 4px 15px var(--box-shadow-color);
    border: 1px solid var(--accent-color);
}

/* H2: API Endpoints (Menggunakan Kuning/Emas) */
.endpoints-header {
    font-size: 1.6em;
    color: var(--secondary-color); 
    margin-bottom: 20px;
    font-weight: 700;
}

/* CATEGORY - DETAILS & SUMMARY */
details {
    background: rgba(0, 0, 0, 0.2);
    border-radius: var(--border-radius);
    margin-bottom: 12px;
    border: 1px solid var(--accent-color);
    transition: all 0.3s ease-in-out;
}

details[open] {
    border-color: var(--accent-color);
    box-shadow: 0 0 10px var(--box-shadow-color);
}

summary {
    padding: 16px 20px;
    cursor: pointer;
    font-size: 1.2em;
    font-weight: 700;
    color: var(--accent-color);
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
    border-radius: var(--border-radius);
}

/* HOVER BARU: Kategori Utama (Warna Biru Gelap Transparan) */
summary:hover {
    background: var(--hover-color-dark-blue);
}

summary .icon {
    font-size: 1.4em;
    flex-shrink: 0;
}

summary .arrow {
    margin-left: auto;
    font-size: 0.8em;
    transition: transform 0.3s ease-in-out; /* Tambahkan transisi ke panah */
}

details[open] summary .arrow {
    transform: rotate(90deg);
}

.category-desc {
    color: #888;
    font-size: 0.85em;
    font-weight: 400;
    margin-top: 2px;
}

/* --- KONTEN KATEGORI UTAMA (Dikontrol JS untuk height animation) --- */
.category-content {
    padding: 0 20px 0 20px; 
    border-top: 1px dashed rgba(104, 211, 145, 0.5);
    overflow: hidden;
    /* Transisi height dan padding diatur di JS */
}

/* -------------------------------------- */


/* ------------------------------------- */
/* STYLES FOR NESTED ENDPOINT DETAILS */
/* ------------------------------------- */

.endpoint-group {
    background: var(--card-bg); 
    border: 1px solid #444; 
    border-radius: var(--border-radius);
    margin-bottom: 8px;
    margin-top: 5px;
    border-left: 4px solid var(--secondary-color); 
}

.endpoint-group:hover {
    box-shadow: 0 0 5px rgba(229, 192, 123, 0.2); 
}

.endpoint-group summary {
    /* Menimpa style summary utama agar tidak terlalu tebal */
    padding: 12px 16px; 
    font-size: 1em;
    font-weight: 400;
    color: var(--text-color);
    background: rgba(0, 0, 0, 0.2);
    border-radius: var(--border-radius);
}

/* HOVER BARU: Endpoint (Warna Biru Gelap Transparan) */
.endpoint-group summary:hover {
     background: var(--hover-color-dark-blue);
}

/* Mengatur agar Title dan Badge berdekatan dan Arrow di ujung kanan */
.endpoint-group summary > div {
    display: flex;
    align-items: center;
    justify-content: space-between; 
    width: 100%;
}

.endpoint-group summary .endpoint-title-group {
    display: flex; 
    align-items: center;
    gap: 10px; 
}

.endpoint-group summary .endpoint-title {
    color: var(--secondary-color); 
    font-weight: 700;
}

.endpoint-group[open] > .endpoint-summary .arrow {
    transform: rotate(90deg);
}

/* --- KONTEN ENDPOINT (Dikontrol JS untuk height animation) --- */
.endpoint-card {
    border-left: none; 
    padding: 0 16px 0 16px; 
    margin: 0;
    background: var(--card-bg); 
    border-top: 1px dashed #444;
    overflow: hidden;
    /* Transisi height dan padding diatur di JS */
}

/* -------------------------------------- */


/* ------------------------------------- */
/* ENDPOINT BADGE AND INFO */
/* ------------------------------------- */

.badge {
    background: #10b981;
    color: var(--bg-color);
    padding: 4px 10px;
    border-radius: var(--border-radius);
    font-size: 0.65em;
    font-weight: bold;
    text-transform: uppercase;
    flex-shrink: 0;
    border: 1px solid #10b981;
}

.badge.ready {
     background: var(--accent-color);
     border-color: var(--accent-color);
}

.badge.update {
    background: var(--secondary-color);
    border-color: var(--secondary-color);
}

.badge.error {
    background: var(--error-color);
    border-color: var(--error-color);
}

.endpoint-desc {
    color: var(--text-color);
    line-height: 1.5;
    margin-bottom: 10px;
    font-size: 0.92em;
}

.endpoint-path {
    background: rgba(0, 0, 0, 0.3);
    color: var(--accent-color);
    padding: 10px 12px;
    border-radius: var(--border-radius);
    font-family: 'Courier New', monospace;
    font-size: 0.85em;
    overflow-x: auto;
    white-space: nowrap;
    border: 1px dashed var(--accent-color);
}

.params-section {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed #444;
}

.params-title {
    font-size: 0.75em;
    color: var(--secondary-color);
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.param-item {
    background: rgba(0, 0, 0, 0.1);
    padding: 6px 10px;
    border-radius: var(--border-radius);
    margin-bottom: 6px;
    font-size: 0.85em;
    border-left: 2px solid var(--secondary-color);
    display: flex;
    gap: 10px;
    align-items: center;
}

.param-item strong {
    color: var(--secondary-color);
    font-weight: bold;
    min-width: 100px;
}

.param-item input {
    flex: 1;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid #444;
    color: var(--text-color);
    padding: 6px 10px;
    border-radius: var(--border-radius);
    font-family: 'Ubuntu Mono', monospace;
    font-size: 0.9em;
}

.param-item input:focus {
    outline: none;
    border-color: var(--accent-color);
    box-shadow: 0 0 5px var(--box-shadow-color);
}

.execute-btn {
    background: var(--accent-color);
    color: var(--bg-color);
    border: none;
    padding: 10px 20px;
    border-radius: var(--border-radius);
    cursor: pointer;
    font-family: 'Ubuntu Mono', monospace;
    font-weight: bold;
    font-size: 0.9em;
    margin-top: 12px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.execute-btn:hover {
    background: var(--bg-color);
    color: var(--accent-color);
    border: 1px solid var(--accent-color);
    box-shadow: 0 0 10px var(--accent-color);
}

.execute-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.result-section {
    margin-top: 12px;
    background: rgba(0, 0, 0, 0.3);
    padding: 12px;
    border-radius: var(--border-radius);
    border: 1px solid #444;
    display: none;
}

.result-header {
    font-size: 0.75em;
    color: var(--secondary-color);
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
    display: flex; 
    align-items: center;
    justify-content: space-between;
}

.copy-btn {
    cursor: pointer;
    color: var(--secondary-color);
    font-size: 1.2em; 
    padding: 0 5px; 
}

.copy-btn:hover {
    color: var(--accent-color);
}

.copy-btn.success {
    color: #48bb78 !important; 
}

.request-url {
    background: rgba(0, 0, 0, 0.5);
    color: var(--accent-color);
    padding: 8px;
    border-radius: var(--border-radius);
    font-size: 0.8em;
    word-break: break-all;
    margin-bottom: 10px;
    border: 1px dashed var(--accent-color);
}

.result-content {
    background: rgba(0, 0, 0, 0.5);
    color: var(--text-color);
    padding: 12px;
    border-radius: var(--border-radius);
    font-size: 0.8em;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
}

/* FOOTER */
footer {
    text-align: center;
    color: #999; 
    margin-top: 32px;
    padding: 16px;
    font-size: 0.95em;
    border-top: 1px dashed #666; 
}

/* LOADING */
.loading {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
    gap: 16px;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid rgba(104, 211, 145, 0.3);
    border-top-color: var(--accent-color);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* RESPONSIVE */
@media (max-width: 768px) {
    h1 {
        font-size: 2em;
    }
    
    .endpoints-container {
        padding: 16px;
    }
    
    summary {
        font-size: 1.1em;
        padding: 14px 16px;
    }
    
    .param-item {
        flex-direction: column;
        align-items: flex-start;
    }
    
    .param-item strong {
        min-width: auto;
    }
    
    .param-item input {
        width: 100%;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fa-solid fa-rocket"></i> GivyAPIs</h1>
            <p class="tagline" id="tagline">Loading...</p>
            <div class="contact-links" id="contactLinks"></div>
        </header>
        
        <div class="endpoints-container">
            <h2 class="endpoints-header"><i class="fa-solid fa-book"></i> API Endpoints</h2>
            <div id="endpoints">
                <div class="loading">
                    <div class="spinner"></div>
                    <p class="loading-text"><i class="fa-solid fa-hourglass-half"></i> Loading endpoints...</p>
                </div>
            </div>
        </div>
        
        <footer id="footer">
            <p>© 2025 GivyAPIs</p>
        </footer>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        // ===========================================
        // === FUNGSI INTI ANIMASI (Buka/Tutup) ===
        // ===========================================
        function toggleDetailsAnimation(detailsElement, contentSelector, duration = 400, isClosingOnly = false) {
            const content = detailsElement.querySelector(contentSelector);
            
            if (detailsElement.hasAttribute('data-animating')) {
                return;
            }

            detailsElement.setAttribute('data-animating', '');

            // Set transisi pada wrapper konten
            content.style.transition = `height ${duration}ms ease-in-out, padding-top ${duration}ms ease-in-out, padding-bottom ${duration}ms ease-in-out`;


            // === MENUTUP (CLOSING) ===
            if (detailsElement.open || isClosingOnly) {
                
                // Pastikan details open agar offsetHeight terukur dengan benar
                if (!detailsElement.open) detailsElement.setAttribute('open', ''); 

                // 1. Lock height saat ini untuk memulai transisi
                const initialHeight = content.offsetHeight;
                content.style.height = initialHeight + 'px';
                
                // 2. Gunakan rAF untuk memastikan browser siap memulai transisi
                requestAnimationFrame(() => {
                    // 3. Mulai transisi ke 0
                    content.style.height = '0px'; 
                    
                    // Hapus padding vertikal saat menutup
                    content.style.paddingTop = '0px';
                    content.style.paddingBottom = '0px';

                    // 4. Setelah transisi selesai
                    setTimeout(() => {
                        detailsElement.removeAttribute('open');
                        content.style.height = ''; 
                        detailsElement.removeAttribute('data-animating');
                        content.style.transition = ''; // Hapus transition inline
                    }, duration);
                });
                
                if (isClosingOnly) return;
                
            // === MEMBUKA (OPENING) ===
            } else {
                
                // 1. Set 'open' agar scrollHeight terukur (konten tersembunyi karena CSS height: 0)
                detailsElement.setAttribute('open', '');
                
                // 2. Ukur tinggi target konten
                const targetHeight = content.scrollHeight;

                // 3. Pastikan height awal 0px dan padding 0
                content.style.height = '0px';
                content.style.paddingTop = '0px';
                content.style.paddingBottom = '0px';
                
                // 4. Gunakan rAF untuk memastikan browser siap memulai transisi
                requestAnimationFrame(() => {
                    // 5. Mulai transisi ke tinggi target
                    content.style.height = targetHeight + 'px';
                    
                    // Terapkan padding akhir
                    if (contentSelector === '.category-content') {
                        content.style.paddingTop = '8px';
                        content.style.paddingBottom = '20px';
                    } else if (contentSelector === '.endpoint-card') {
                        content.style.paddingTop = '10px';
                        content.style.paddingBottom = '16px';
                    }
                    
                    // 6. Cleanup setelah transisi
                    setTimeout(() => {
                        content.style.height = ''; // Hapus height agar konten bisa menyesuaikan diri (misal jika ada perubahan DOM)
                        detailsElement.removeAttribute('data-animating');
                        content.style.transition = ''; // Hapus transition inline
                    }, duration);
                });

            }
        }

        // ===========================================
        // === FUNGSI SETUP LISTENER & AUTO-CLOSE ===
        // ===========================================
        function setupDetailsAnimation(detailsElement, contentSelector, duration = 400) {
            const summary = detailsElement.querySelector('summary');

            summary.addEventListener('click', (e) => {
                e.preventDefault();
                
                // Logic Auto-Close Sibling (Hanya dilakukan jika elemen ini AKAN dibuka)
                if (!detailsElement.open) { 
                    const parentContainer = detailsElement.parentElement;
                    
                    if (parentContainer.id === 'endpoints' || parentContainer.classList.contains('category-content')) {
                        const siblings = parentContainer.querySelectorAll(detailsElement.tagName);
                        
                        siblings.forEach(sibling => {
                            if (sibling !== detailsElement && sibling.open) {
                                // Panggil fungsi animasi untuk menutup sibling
                                toggleDetailsAnimation(sibling, sibling.classList.contains('endpoint-group') ? '.endpoint-card' : '.category-content', duration, true);
                            }
                        });
                    }
                    
                    // === PERBAIKAN SCROLL: SCROLL MULUS KE ELEMEN YANG BARU DIBUKA ===
                    // Delay yang lebih panjang (duration * 1.5) untuk memastikan kedua animasi (buka dan tutup sibling) SAMA-SAMA selesai dan DOM stabil.
                    setTimeout(() => {
                        detailsElement.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start' 
                        });
                    }, duration * 1.5); 
                    // ================================================================
                }
                
                // Panggil fungsi animasi untuk elemen ini sendiri (buka/tutup)
                toggleDetailsAnimation(detailsElement, contentSelector, duration);
            });
        }
        // ===========================================
        
        // Function untuk menyalin konten hasil JSON
        function copyResultContent(btnElement, uniqueId) {
            const contentElement = document.getElementById(`content-${uniqueId}`);
            const content = contentElement.textContent;

            if (!content || content.startsWith('Loading...') || content.startsWith('Error:')) {
                alert('Tidak ada JSON response yang valid untuk disalin.');
                return;
            }

            // Gunakan navigator.clipboard untuk menyalin
            navigator.clipboard.writeText(content).then(() => {
                // Feedback visual: ubah ikon menjadi centang
                const originalIconClass = btnElement.className;
                btnElement.className = 'fa-solid fa-check copy-btn success';
                
                setTimeout(() => {
                    // Kembalikan ikon setelah 1.5 detik
                    btnElement.className = originalIconClass;
                }, 1500);
            }).catch(err => {
                console.error('Failed to copy: ', err);
                alert('Gagal menyalin teks. Silakan salin secara manual.');
            });
        }

        // Load Endpoints dengan Details/Summary
        async function loadEndpoints() {
            try {
                // PENGAMBILAN KONFIGURASI DARI SERVER
                const res = await fetch(`${BASE_URL}/api/config`);
                
                if (!res.ok) {
                    throw new Error(`Failed to fetch config: ${res.statusText}`);
                }

                const data = await res.json();
                
                document.getElementById('tagline').textContent = data.tagline || data.description;
                
                // Update contact links (ikon Telegram dan GitHub)
                if (data.contact) {
                    let contactHTML = '';
                    if (data.contact.telegram) {
                        contactHTML += `<a href="${data.contact.telegram}" target="_blank"><i class="fa-brands fa-telegram"></i> Telegram</a>`;
                    }
                    if (data.contact.github) {
                        contactHTML += `<a href="${data.contact.github}" target="_blank"><i class="fa-brands fa-github"></i> GitHub</a>`;
                    }
                    document.getElementById('contactLinks').innerHTML = contactHTML;
                }
                
                // Build endpoints HTML dengan <details> & <summary>
                let html = '';
                data.categories.forEach((cat, catIndex) => {
                    // Kategori utama
                    const iconClass = cat.icon || 'fa-solid fa-folder-open';
                    const desc = cat.description || '';
                    
                    html += `
                        <details id="category-${catIndex}">
                            <summary>
                                <span class="icon"><i class="${iconClass}"></i></span>
                                <div style="flex: 1;">
                                    <div>${cat.name}</div>
                                    <div class="category-desc">${desc}</div>
                                </div>
                                <span class="arrow"><i class="fa-solid fa-chevron-right"></i></span>
                            </summary>
                            <div class="category-content">
                    `;
                    
                    // Loop untuk items (ENDPOINT) - DIBUAT SEBAGAI NESTED DETAILS
                    cat.items.forEach((item, itemIndex) => {
                        const badgeClass = item.status === 'ready' ? 'ready' : 
                                          item.status === 'update' ? 'update' : 'error';
                        const uniqueId = `${catIndex}-${itemIndex}`;
                        
                        const displayPath = item.path.startsWith('/') ? `${BASE_URL}${item.path}` : `${BASE_URL}/${item.path}`;

                        html += `
                            <details class="endpoint-group">
                                <summary class="endpoint-summary">
                                    <div>
                                        <div class="endpoint-title-group">
                                            <div class="endpoint-title">${item.name}</div>
                                            <span class="badge ${badgeClass}">${item.status}</span>
                                        </div>
                                        <span class="arrow" style="font-size: 0.8em;"><i class="fa-solid fa-chevron-right"></i></span>
                                    </div>
                                </summary>

                                <div class="endpoint-card"> 
                                    <p class="endpoint-desc">${item.desc}</p>
                                    <div class="endpoint-path">${displayPath}</div>
                        `;
                        
                        // Parameters section
                        if (item.params && Object.keys(item.params).length > 0) {
                            html += `
                                <div class="params-section">
                                    <div class="params-title">Parameters:</div>
                            `;
                            Object.entries(item.params).forEach(([key, value]) => {
                                html += `
                                    <div class="param-item">
                                        <strong>${key}:</strong>
                                        <input type="text" id="input-${uniqueId}-${key}" placeholder="${value}">
                                    </div>
                                `;
                            });
                            html += `
                                <button class="execute-btn" data-path="${item.path}" data-id="${uniqueId}" data-params='${JSON.stringify(Object.keys(item.params))}'>
                                    <i class="fa-solid fa-play"></i> Execute
                                </button>
                                <div class="result-section" id="result-${uniqueId}"></div>
                            `;
                            html += `</div>`;
                        } else {
                            html += `
                                <button class="execute-btn" data-path="${item.path}" data-id="${uniqueId}" data-params='[]'>
                                    <i class="fa-solid fa-play"></i> Execute
                                </button>
                                <div class="result-section" id="result-${uniqueId}"></div>
                            `;
                        }
                        
                        html += `</div></details>`; // Close endpoint-card dan nested details
                    });
                    
                    html += `
                            </div>
                        </details>
                    `; // Close details kategori utama
                });
                
                document.getElementById('endpoints').innerHTML = html;

                // ===========================================
                // === HOOKUP ANIMASI HALUS KE SEMUA DETAILS ===
                // ===========================================
                
                // 1. Kategori Utama (Main Categories)
                document.querySelectorAll('#endpoints > details').forEach(detail => {
                    setupDetailsAnimation(detail, '.category-content');
                });

                // 2. Endpoint Group (Nested Details)
                document.querySelectorAll('.endpoint-group').forEach(group => {
                    setupDetailsAnimation(group, '.endpoint-card');
                });
                // ===========================================


                // Add event listener untuk semua execute buttons
                document.querySelectorAll('.execute-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const path = this.getAttribute('data-path');
                        const uniqueId = this.getAttribute('data-id');
                        const paramKeys = JSON.parse(this.getAttribute('data-params'));
                        
                        executeRequest(path, uniqueId, paramKeys, this); 
                    });
                });
                
            } catch (e) {
                document.getElementById('endpoints').innerHTML = `
                    <div style="text-align: center; padding: 30px; color: #ef4444;">
                        <h3><i class="fa-solid fa-triangle-exclamation"></i> Failed to load endpoints</h3>
                        <p style="margin-top: 10px; color: #888;">${e.message}</p>
                    </div>
                `;
            }
        }

        // Function untuk execute request
        function executeRequest(path, uniqueId, paramKeys, btnElement) { 
            const resultDiv = document.getElementById(`result-${uniqueId}`);
            
            btnElement.disabled = true;
            btnElement.innerHTML = '<i class="fa-solid fa-hourglass-half"></i> Loading...';
            
            const cleanedPath = path.split('?')[0]; 
            let url = BASE_URL + cleanedPath; 

            const queryParams = new URLSearchParams();
            
            paramKeys.forEach(key => {
                const inputElement = document.getElementById(`input-${uniqueId}-${key}`);
                if (inputElement) {
                    const inputValue = inputElement.value.trim();
                    if (inputValue) {
                        queryParams.append(key, inputValue);
                    }
                }
            });
            
            if (queryParams.toString()) {
                url += '?' + queryParams.toString();
            }
            
            // Show result section
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div class="result-header">📡 Request URL:</div>
                <div class="request-url">${url}</div>
                
                <div class="result-header">
                    📦 Response
                    <i class="fa-solid fa-copy copy-btn" onclick="copyResultContent(this, '${uniqueId}')" title="Copy Response"></i>
                </div>
                <div class="result-content" id="content-${uniqueId}">Loading...</div>
            `;
            
            // Fetch data
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(text => { 
                            throw new Error(`HTTP Error ${response.status}: ${text.substring(0, 50)}...`);
                        });
                    }
                    return response.json();
                })
                .then(data => {
                    const resultContent = resultDiv.querySelector('.result-content');
                    resultContent.textContent = JSON.stringify(data, null, 2);
                    resultContent.style.color = 'var(--text-color)';
                    btnElement.disabled = false;
                    btnElement.innerHTML = '<i class="fa-solid fa-play"></i> Execute';
                })
                .catch(error => {
                    const resultContent = resultDiv.querySelector('.result-content');
                    resultContent.textContent = `Error: ${error.message}`;
                    resultContent.style.color = 'var(--error-color)';
                    btnElement.disabled = false;
                    btnElement.innerHTML = '<i class="fa-solid fa-play"></i> Execute';
                });
        }

        // Initialize
        loadEndpoints();
    </script>
</body>
</html>
