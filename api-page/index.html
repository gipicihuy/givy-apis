<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GivyAPIs Documentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* HEADER */
        header {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            margin-bottom: 24px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .tagline {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 16px;
        }
        
        .contact-links {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .contact-links a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        
        .contact-links a:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        /* ENDPOINTS CONTAINER */
        .endpoints-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        
        .endpoints-header {
            font-size: 1.6em;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        /* CATEGORY - DETAILS & SUMMARY */
        details {
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        details[open] {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }
        
        summary {
            padding: 16px 20px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: 600;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 12px;
            user-select: none;
            border-radius: 10px;
            transition: all 0.2s;
        }
        
        summary:hover {
            background: rgba(102, 126, 234, 0.08);
        }
        
        summary::marker {
            content: '';
        }
        
        summary .icon {
            font-size: 1.4em;
            flex-shrink: 0;
        }
        
        summary .arrow {
            margin-left: auto;
            font-size: 0.8em;
            transition: transform 0.3s;
        }
        
        details[open] summary .arrow {
            transform: rotate(90deg);
        }
        
        .category-desc {
            color: #888;
            font-size: 0.85em;
            font-weight: 400;
            margin-top: 2px;
        }
        
        .category-content {
            padding: 8px 20px 20px 20px;
        }
        
        /* ENDPOINT CARD */
        .endpoint-card {
            background: white;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }
        
        .endpoint-card:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .endpoint-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 10px;
        }
        
        .endpoint-title {
            font-size: 1.1em;
            color: #667eea;
            font-weight: 600;
        }
        
        .badge {
            background: #10b981;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.65em;
            font-weight: bold;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        
        .badge.update {
            background: #f59e0b;
        }
        
        .badge.error {
            background: #ef4444;
        }
        
        .endpoint-desc {
            color: #666;
            line-height: 1.5;
            margin-bottom: 10px;
            font-size: 0.92em;
        }
        
        .endpoint-path {
            background: #2d3748;
            color: #68d391;
            padding: 10px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            overflow-x: auto;
            white-space: nowrap;
        }
        
        .params-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
        }
        
        .params-title {
            font-size: 0.75em;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .param-item {
            background: #f8f9fa;
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 0.85em;
        }
        
        .param-item strong {
            color: #667eea;
        }
        
        /* FOOTER */
        footer {
            text-align: center;
            color: white;
            margin-top: 32px;
            padding: 16px;
            font-size: 0.95em;
        }
        
        /* LOADING */
        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            gap: 16px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #667eea;
            font-size: 1em;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            
            .endpoints-container {
                padding: 16px;
            }
            
            summary {
                font-size: 1.1em;
                padding: 14px 16px;
            }
            
            .endpoint-card {
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>🚀 GivyAPIs</h1>
            <p class="tagline" id="tagline">Loading...</p>
            <div class="contact-links" id="contactLinks"></div>
        </header>
        
        <!-- ENDPOINTS -->
        <div class="endpoints-container">
            <h2 class="endpoints-header">📚 API Endpoints</h2>
            <div id="endpoints">
                <div class="loading">
                    <div class="spinner"></div>
                    <p class="loading-text">Loading endpoints...</p>
                </div>
            </div>
        </div>
        
        <!-- FOOTER -->
        <footer id="footer">
            <p>© 2025 GivyAPIs | Made with ❤️ by <strong>Givy</strong></p>
        </footer>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        // Load Endpoints dengan Details/Summary
        async function loadEndpoints() {
            try {
                const res = await fetch(`${BASE_URL}/assets/settings.json`);
                const data = await res.json();
                
                // Update tagline
                document.getElementById('tagline').textContent = data.tagline || data.description;
                
                // Update contact links
                if (data.contact) {
                    let contactHTML = '';
                    if (data.contact.telegram) {
                        contactHTML += `<a href="${data.contact.telegram}" target="_blank">📱 Telegram</a>`;
                    }
                    if (data.contact.github) {
                        contactHTML += `<a href="${data.contact.github}" target="_blank">💻 GitHub</a>`;
                    }
                    document.getElementById('contactLinks').innerHTML = contactHTML;
                }
                
                // Build endpoints HTML dengan <details> & <summary>
                let html = '';
                data.categories.forEach(cat => {
                    const icon = cat.icon || '📦';
                    const desc = cat.description || '';
                    
                    html += `
                        <details>
                            <summary>
                                <span class="icon">${icon}</span>
                                <div style="flex: 1;">
                                    <div>${cat.name}</div>
                                    <div class="category-desc">${desc}</div>
                                </div>
                                <span class="arrow">▶</span>
                            </summary>
                            <div class="category-content">
                    `;
                    
                    cat.items.forEach(item => {
                        const badgeClass = item.status === 'ready' ? '' : 
                                          item.status === 'update' ? 'update' : 'error';
                        
                        html += `
                            <div class="endpoint-card">
                                <div class="endpoint-header">
                                    <div class="endpoint-title">${item.name}</div>
                                    <span class="badge ${badgeClass}">${item.status}</span>
                                </div>
                                <p class="endpoint-desc">${item.desc}</p>
                                <div class="endpoint-path">${BASE_URL}${item.path}</div>
                        `;
                        
                        // Parameters section
                        if (item.params && Object.keys(item.params).length > 0) {
                            html += `
                                <div class="params-section">
                                    <div class="params-title">Parameters:</div>
                            `;
                            Object.entries(item.params).forEach(([key, value]) => {
                                html += `
                                    <div class="param-item">
                                        <strong>${key}:</strong> ${value}
                                    </div>
                                `;
                            });
                            html += `</div>`;
                        }
                        
                        html += `</div>`; // Close endpoint-card
                    });
                    
                    html += `
                            </div>
                        </details>
                    `; // Close details
                });
                
                document.getElementById('endpoints').innerHTML = html;
            } catch (e) {
                document.getElementById('endpoints').innerHTML = `
                    <div style="text-align: center; padding: 30px; color: #ef4444;">
                        <h3>⚠️ Failed to load endpoints</h3>
                        <p style="margin-top: 10px; color: #888;">${e.message}</p>
                    </div>
                `;
            }
        }

        // Initialize
        loadEndpoints();
    </script>
</body>
</html>
