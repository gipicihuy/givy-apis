<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GivyAPIs Documentation</title>
    <style>
:root {
    --bg-color: #282c34;
    --text-color: #abb2bf;
    --accent-color: #68d391;
    --secondary-color: #e5c07b;
    --error-color: #e06c75;
    --card-bg: #21252b;
    --border-radius: 0px;
    --box-shadow-color: rgba(104, 211, 145, 0.2);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Ubuntu Mono', monospace;
    background-color: var(--bg-color);
    min-height: 100vh;
    padding: 20px;
    color: var(--text-color);
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

header {
    background: var(--card-bg);
    padding: 30px;
    border-radius: var(--border-radius);
    box-shadow: 0 4px 15px var(--box-shadow-color);
    margin-bottom: 24px;
    text-align: center;
    border: 1px solid var(--accent-color);
}

h1 {
    font-size: 2.5em;
    color: var(--accent-color);
    margin-bottom: 8px;
    text-shadow: 0 0 5px var(--accent-color);
}

.tagline {
    color: var(--text-color);
    font-size: 1.1em;
    margin-bottom: 16px;
}

.contact-links {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
}

.contact-links a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--accent-color);
    color: var(--bg-color);
    text-decoration: none;
    border-radius: var(--border-radius);
    font-size: 0.9em;
    transition: all 0.3s;
    font-weight: bold;
    border: 1px solid var(--accent-color);
}

.contact-links a:hover {
    background: var(--bg-color);
    color: var(--accent-color);
    box-shadow: 0 0 10px var(--accent-color);
}

.endpoints-container {
    background: var(--card-bg);
    padding: 24px;
    border-radius: var(--border-radius);
    box-shadow: 0 4px 15px var(--box-shadow-color);
    border: 1px solid var(--accent-color);
}

.endpoints-header {
    font-size: 1.6em;
    color: var(--accent-color);
    margin-bottom: 20px;
    font-weight: 700;
}

details {
    background: rgba(0, 0, 0, 0.2);
    border-radius: var(--border-radius);
    margin-bottom: 12px;
    border: 1px solid var(--accent-color);
    transition: all 0.3s;
}

details[open] {
    border-color: var(--accent-color);
    box-shadow: 0 0 10px var(--box-shadow-color);
}

summary {
    padding: 16px 20px;
    cursor: pointer;
    font-size: 1.2em;
    font-weight: 700;
    color: var(--accent-color);
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
    border-radius: var(--border-radius);
    transition: all 0.2s;
}

summary:hover {
    background: rgba(104, 211, 145, 0.1);
}

summary::marker {
    content: '';
}

summary .icon {
    font-size: 1.4em;
    flex-shrink: 0;
}

summary .arrow {
    margin-left: auto;
    font-size: 0.8em;
    transition: transform 0.3s;
}

details[open] summary .arrow {
    transform: rotate(90deg);
}

.category-desc {
    color: #888;
    font-size: 0.85em;
    font-weight: 400;
    margin-top: 2px;
}

.category-content {
    padding: 8px 20px 20px 20px;
    border-top: 1px dashed rgba(104, 211, 145, 0.5);
}

.endpoint-card {
    background: var(--card-bg);
    padding: 16px;
    border-radius: var(--border-radius);
    margin-bottom: 10px;
    border-left: 4px solid var(--accent-color);
    transition: all 0.3s;
    border: 1px solid var(--bg-color);
}

.endpoint-card:hover {
    box-shadow: 0 0 8px var(--box-shadow-color);
}

.endpoint-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 10px;
}

.endpoint-title {
    font-size: 1.1em;
    color: var(--accent-color);
    font-weight: 700;
}

.badge {
    background: #10b981;
    color: var(--bg-color);
    padding: 4px 10px;
    border-radius: var(--border-radius);
    font-size: 0.65em;
    font-weight: bold;
    text-transform: uppercase;
    flex-shrink: 0;
    border: 1px solid #10b981;
}

.badge.ready {
    background: var(--accent-color);
    border-color: var(--accent-color);
}

.badge.update {
    background: var(--secondary-color);
    border-color: var(--secondary-color);
}

.badge.error {
    background: var(--error-color);
    border-color: var(--error-color);
}

.endpoint-desc {
    color: var(--text-color);
    line-height: 1.5;
    margin-bottom: 10px;
    font-size: 0.92em;
}

.endpoint-path {
    background: rgba(0, 0, 0, 0.3);
    color: var(--accent-color);
    padding: 10px 12px;
    border-radius: var(--border-radius);
    font-family: 'Courier New', monospace;
    font-size: 0.85em;
    overflow-x: auto;
    white-space: nowrap;
    border: 1px dashed var(--accent-color);
    margin-bottom: 10px;
}

.params-section {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed #444;
}

.params-title {
    font-size: 0.75em;
    color: var(--secondary-color);
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.param-item {
    background: rgba(0, 0, 0, 0.1);
    padding: 6px 10px;
    border-radius: var(--border-radius);
    margin-bottom: 6px;
    font-size: 0.85em;
    border-left: 2px solid var(--secondary-color);
    display: flex;
    gap: 10px;
    align-items: center;
}

.param-item strong {
    color: var(--secondary-color);
    font-weight: bold;
    min-width: 100px;
}

.param-item input {
    flex: 1;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid #444;
    color: var(--text-color);
    padding: 6px 10px;
    border-radius: var(--border-radius);
    font-family: 'Ubuntu Mono', monospace;
    font-size: 0.9em;
}

.param-item input:focus {
    outline: none;
    border-color: var(--accent-color);
    box-shadow: 0 0 5px var(--box-shadow-color);
}

.execute-btn {
    background: var(--accent-color);
    color: var(--bg-color);
    border: none;
    padding: 10px 20px;
    border-radius: var(--border-radius);
    cursor: pointer;
    font-family: 'Ubuntu Mono', monospace;
    font-weight: bold;
    font-size: 0.9em;
    margin-top: 12px;
    transition: all 0.3s;
    width: 100%;
}

.execute-btn:hover {
    background: var(--bg-color);
    color: var(--accent-color);
    border: 1px solid var(--accent-color);
    box-shadow: 0 0 10px var(--accent-color);
}

.execute-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.result-section {
    margin-top: 12px;
    background: rgba(0, 0, 0, 0.3);
    padding: 12px;
    border-radius: var(--border-radius);
    border: 1px solid #444;
}

.result-header {
    font-size: 0.75em;
    color: var(--secondary-color);
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
}

.request-url {
    background: rgba(0, 0, 0, 0.5);
    color: var(--accent-color);
    padding: 8px;
    border-radius: var(--border-radius);
    font-size: 0.8em;
    word-break: break-all;
    margin-bottom: 10px;
    border: 1px dashed var(--accent-color);
}

.result-content {
    background: rgba(0, 0, 0, 0.5);
    color: var(--text-color);
    padding: 12px;
    border-radius: var(--border-radius);
    font-size: 0.8em;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
}

.loading {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
    gap: 16px;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid rgba(104, 211, 145, 0.3);
    border-top-color: var(--accent-color);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading-text {
    color: var(--accent-color);
    font-size: 1em;
}

footer {
    text-align: center;
    color: #444;
    margin-top: 32px;
    padding: 16px;
    font-size: 0.95em;
    border-top: 1px dashed #444;
}

@media (max-width: 768px) {
    h1 {
        font-size: 2em;
    }
    
    .endpoints-container {
        padding: 16px;
    }
    
    summary {
        font-size: 1.1em;
        padding: 14px 16px;
    }
    
    .endpoint-card {
        padding: 14px;
    }
    
    .param-item {
        flex-direction: column;
        align-items: flex-start;
    }
    
    .param-item strong {
        min-width: auto;
    }
    
    .param-item input {
        width: 100%;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 GivyAPIs</h1>
            <p class="tagline">Simple, Fast, & Scalable REST API - Start with Stalker, Expand Anytime!</p>
            <div class="contact-links">
                <a href="https://t.me/givyo" target="_blank">📱 Telegram</a>
                <a href="https://github.com/yourusername" target="_blank">💻 GitHub</a>
            </div>
        </header>
        
        <div class="endpoints-container">
            <h2 class="endpoints-header">📚 API Endpoints</h2>
            <div id="endpoints">
                <div class="loading">
                    <div class="spinner"></div>
                    <p class="loading-text">Loading endpoints...</p>
                </div>
            </div>
        </div>
        
        <footer>
            <p>© 2025 GivyAPIs | Made with ❤️ by <strong>Givy</strong></p>
        </footer>
    </div>

    <script>
        const BASE_URL = 'https://your-api-domain.com'; // Ganti dengan domain API Anda

        const apiData = {
            "name": "GivyAPIs",
            "tagline": "Start with Stalker, Expand Anytime!",
            "categories": [
                {
                    "name": "Stalker",
                    "icon": "🔍",
                    "description": "Social media & game profile lookup",
                    "items": [
                        {
                            "name": "Instagram Stalker",
                            "desc": "Get Instagram profile info (username, followers, bio, posts, etc)",
                            "path": "/stalk/ig",
                            "status": "ready",
                            "params": {
                                "username": "Instagram username (without @)"
                            }
                        },
                        {
                            "name": "Free Fire Stalker",
                            "desc": "Get Free Fire player info (nickname, server, last scan time)",
                            "path": "/stalk/ff",
                            "status": "ready",
                            "params": {
                                "playerid": "Free Fire Player ID (example: 1234567890)"
                            }
                        },
                        {
                            "name": "Roblox Stalker",
                            "desc": "Get Roblox player detailed info (username, status, friends, badges, groups, presence)",
                            "path": "/stalk/roblox",
                            "status": "ready",
                            "params": {
                                "username": "Roblox username (example: BuilderMan)"
                            }
                        },
                        {
                            "name": "NGL Checker",
                            "desc": "Check NGL username validity with profile picture",
                            "path": "/stalk/ngl",
                            "status": "ready",
                            "params": {
                                "username": "NGL username to verify"
                            }
                        }
                    ]
                },
                {
                    "name": "System",
                    "icon": "⚙️",
                    "description": "API system information & monitoring",
                    "items": [
                        {
                            "name": "API Status",
                            "desc": "Check API health, total requests, total features, and uptime",
                            "path": "/api/status",
                            "status": "ready"
                        }
                    ]
                }
            ]
        };

        function executeRequest(path, params) {
            const resultDiv = document.getElementById(`result-${path.replace(/\//g, '-')}`);
            const executeBtn = document.getElementById(`btn-${path.replace(/\//g, '-')}`);
            
            executeBtn.disabled = true;
            executeBtn.textContent = '⏳ Loading...';
            
            let url = BASE_URL + path;
            const queryParams = new URLSearchParams();
            
            for (const [key, value] of Object.entries(params)) {
                const inputValue = document.getElementById(`input-${path}-${key}`).value.trim();
                if (inputValue) {
                    queryParams.append(key, inputValue);
                }
            }
            
            if (queryParams.toString()) {
                url += '?' + queryParams.toString();
            }
            
            resultDiv.innerHTML = `
                <div class="result-header">📡 Request URL:</div>
                <div class="request-url">${url}</div>
                <div class="result-header">📦 Response:</div>
                <div class="result-content">Loading...</div>
            `;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const resultContent = resultDiv.querySelector('.result-content');
                    resultContent.textContent = JSON.stringify(data, null, 2);
                    executeBtn.disabled = false;
                    executeBtn.textContent = '▶️ Execute';
                })
                .catch(error => {
                    const resultContent = resultDiv.querySelector('.result-content');
                    resultContent.textContent = `Error: ${error.message}`;
                    resultContent.style.color = 'var(--error-color)';
                    executeBtn.disabled = false;
                    executeBtn.textContent = '▶️ Execute';
                });
        }

        function loadEndpoints() {
            let html = '';
            
            apiData.categories.forEach((cat, catIndex) => {
                const icon = cat.icon || '📦';
                const desc = cat.description || '';
                
                html += `
                    <details id="category-${catIndex}">
                        <summary>
                            <span class="icon">${icon}</span>
                            <div style="flex: 1;">
                                <div>${cat.name}</div>
                                <div class="category-desc">${desc}</div>
                            </div>
                            <span class="arrow">▶</span>
                        </summary>
                        <div class="category-content">
                `;
                
                cat.items.forEach(item => {
                    const badgeClass = item.status === 'ready' ? '' : 
                                      item.status === 'update' ? 'update' : 'error';
                    const pathId = item.path.replace(/\//g, '-');
                    
                    html += `
                        <div class="endpoint-card">
                            <div class="endpoint-header">
                                <div class="endpoint-title">${item.name}</div>
                                <span class="badge ${badgeClass}">${item.status}</span>
                            </div>
                            <p class="endpoint-desc">${item.desc}</p>
                            <div class="endpoint-path">${BASE_URL}${item.path}</div>
                    `;
                    
                    if (item.params && Object.keys(item.params).length > 0) {
                        html += `<div class="params-section"><div class="params-title">Parameters:</div>`;
                        
                        Object.entries(item.params).forEach(([key, value]) => {
                            html += `
                                <div class="param-item">
                                    <strong>${key}:</strong>
                                    <input type="text" id="input-${item.path}-${key}" placeholder="${value}">
                                </div>
                            `;
                        });
                        
                        html += `
                            <button class="execute-btn" id="btn-${pathId}" onclick="executeRequest('${item.path}', ${JSON.stringify(Object.keys(item.params).reduce((acc, key) => {acc[key] = ''; return acc;}, {}))})">
                                ▶️ Execute
                            </button>
                            <div class="result-section" id="result-${pathId}" style="display: none;"></div>
                        `;
                        html += `</div>`;
                    } else {
                        html += `
                            <button class="execute-btn" id="btn-${pathId}" onclick="executeRequest('${item.path}', {})">
                                ▶️ Execute
                            </button>
                            <div class="result-section" id="result-${pathId}" style="display: none;"></div>
                        `;
                    }
                    
                    html += `</div>`;
                });
                
                html += `</div></details>`;
            });
            
            document.getElementById('endpoints').innerHTML = html;
            
            // Auto-close other details when opening one
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(detail => {
                detail.addEventListener('toggle', function() {
                    if (this.open) {
                        allDetails.forEach(other => {
                            if (other !== this) {
                                other.open = false;
                            }
                        });
                    }
                });
            });
            
            // Show result section when execute button is clicked
            document.querySelectorAll('.execute-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const pathId = this.id.replace('btn-', '');
                    const resultDiv = document.getElementById(`result-${pathId}`);
                    resultDiv.style.display = 'block';
                });
            });
        }

        loadEndpoints();
    </script>
</body>
</html>
